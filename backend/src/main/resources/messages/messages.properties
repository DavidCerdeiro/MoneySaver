# Forgot password
forgot.password.subject=[MoneySaver] Recuperación de contraseña
forgot.password.body=¡Hola!\nSentimos que hayas olvidado tu contraseña, para restablecerla usa el siguiente código de verificación: {0}\n\nEste código expirará en 5 minutos.\n\nRecibes este correo porque se ha solicitado el reestablecimiento de tu contraseña.
forgot.password.successSubject=[MoneySaver] Contraseña restablecida
forgot.password.successBody=¡Hola!\nTu contraseña ha sido restablecida correctamente.\n\nSi no ha sido usted, por favor contacta con nuestro soporte (moneysaver.support@gmail.com) inmediatamente.\n\nRecibes este correo porque se ha restablecido tu contraseña en MoneySaver.

# Email verification
verify.email.subject=[MoneySaver] Verificación de correo electrónico
signUp.email.body=¡Hola!\nGracias por registrarte en MoneySaver, para completar el registro verifica tu correo electrónico usando el siguiente código: {0}\n\nEste código expirará en 5 minutos.\n\nRecibes este correo para continuar con el proceso de registro.
logIn.email.body=¡Hola!\nPara continuar con el inicio de sesión, verifica tu correo electrónico usando el siguiente código: {0}\n\nEste código expirará en 5 minutos.\n\nRecibes este correo para iniciar sesión en tu cuenta de MoneySaver.
# Sign Up
signUp.successSubject=[MoneySaver] Bienvenido a MoneySaver
signUp.successBody=¡Hola!\nTu cuenta ha sido creada correctamente.\n\nSi no ha sido usted, por favor contacta con nuestro soporte (moneysaver.support@gmail.com) inmediatamente.\n\nRecibes este correo porque te has registrado en MoneySaver.

# Delete Profile
delete.email.subject=[MoneySaver] Eliminación de cuenta
delete.email.body=¡Hola!\nPara continuar con la eliminación de tu cuenta, verifica tu correo electrónico usando el siguiente código: {0}\n\nEste código expirará en 5 minutos.\n\nRecibes este correo para eliminar tu cuenta de MoneySaver.
delete.successSubject=[MoneySaver] Cuenta eliminada
delete.successBody=¡Hola!\nTu cuenta ha sido eliminada correctamente.\n\nSi no ha sido usted, por favor contacta con nuestro soporte (moneysaver.support@gmail.com) inmediatamente.\n\nRecibes este correo porque se ha eliminado tu cuenta en MoneySaver.

#Log In
logIn.successSubject=[MoneySaver] Inicio de sesión
logIn.successBody=¡Hola!\nHa iniciado sesión correctamente.\n\nSi no ha sido usted, por favor contacta con nuestro soporte (moneysaver.support@gmail.com) inmediatamente.\n\nRecibes este correo porque has iniciado sesión en tu cuenta de MoneySaver.