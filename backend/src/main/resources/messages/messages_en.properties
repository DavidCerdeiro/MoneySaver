# Forgot password
forgot.password.subject=[MoneySaver] Password Recovery
forgot.password.body=Hello!\nWe noticed you forgot your password. Use the following verification code to reset it: {0}\n\nThis code will expire in 5 minutes.\n\nYou received this email because a password reset was requested for your account.
forgot.password.successSubject=[MoneySaver] Password Reset
forgot.password.successBody=Hello!\nYour password has been successfully reset.\n\nIf it wasn't you, please contact our support (moneysaver.support@gmail.com) immediately.\n\nYou received this email because your password was reset on MoneySaver.

# Email verification
verify.email.subject=[MoneySaver] Email Verification
signUp.email.body=Hello!\nThank you for signing up for MoneySaver. To complete the registration, please verify your email using the following code: {0}\n\nThis code will expire in 5 minutes.\n\nYou received this email to continue the registration process.
logIn.email.body=Hello!\nTo continue logging in, please verify your email using the following code: {0}\n\nThis code will expire in 5 minutes.\n\nYou received this email to log in to your MoneySaver account.

# Sign Up
