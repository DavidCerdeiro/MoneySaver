server.port=${PORT:8081}
spring.datasource.url=${JDBC_DATABASE_URL}
spring.jpa.hibernate.ddl-auto=validate

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# si usas Quartz en prod, evita recrear el schema automáticamente
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never
spring.quartz.datasource.url=${JDBC_DATABASE_URL}
spring.quartz.datasource.driver-class-name=org.postgresql.Driver

# tus secrets/ids
truelayer.client-id=${TRUELAYER_CLIENT_ID}
truelayer.client-secret=${TRUELAYER_CLIENT_SECRET}
truelayer.redirect-url=${TRUELAYER_REDIRECT_URL}