server.port=${PORT:8081}
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL}

spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never
spring.quartz.datasource.url=${DATABASE_URL}
spring.quartz.datasource.driver-class-name=org.postgresql.Driver

truelayer.client-id=${TRUELAYER_CLIENT_ID}
truelayer.client-secret=${TRUELAYER_CLIENT_SECRET}
truelayer.redirect-url=${TRUELAYER_REDIRECT_URL}

documentai.project-id=${DOCUMENTAI_PROJECT_ID}
documentai.location=${DOCUMENTAI_LOCATION}
documentai.processor-id=${DOCUMENTAI_PROCESSOR_ID}

google.bucket-name=${GOOGLE_BUCKET_NAME}