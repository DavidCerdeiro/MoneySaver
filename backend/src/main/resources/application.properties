spring.application.name=backend
server.port=8081

# Security
spring.security.user.name=admin
spring.security.user.password={noop}admin

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/tfg
spring.datasource.username=postgres
spring.datasource.password=usuario
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL}

# i18n
spring.messages.basename=messages/messages
spring.messages.encoding=UTF-8

# Quartz
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.scheduler-name=CategoryMonthlyResetScheduler
spring.quartz.overwrite-existing-jobs=true

# File Uploads
spring.servlet.multipart.max-file-size=21MB
spring.servlet.multipart.max-request-size=21MB

# TrueLayer API
truelayer.client-id=sandbox-moneysaver-fefb0e
truelayer.client-secret=${TRUELAYER_CLIENT_SECRET}
truelayer.redirect-url=http://localhost:5173/callback

# Google Cloud
google.bucket-name=filesmoneysaver
documentai.project-id=6904079188
documentai.location=eu
documentai.processor-id=7a0c31f5d3e9cf2a